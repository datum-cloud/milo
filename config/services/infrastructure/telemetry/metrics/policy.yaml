apiVersion: resourcemetrics.miloapis.com/v1alpha1
kind: ResourceMetricsPolicy
metadata:
  name: milo-infrastructure-metrics
spec:
  generators:
    # infrastructure.miloapis.com: ProjectControlPlane
    - name: infrastructure-project-control-planes-info
      resource:
        group: infrastructure.miloapis.com
        version: v1alpha1
        resource: projectcontrolplanes
      families:
        - name: milo_project_control_planes_info
          help: "Information about infrastructure project control planes"
          type: gauge
          metrics:
            - labels:
                - name: name
                  value: "object.metadata.name"
                - name: namespace
                  value: "object.metadata.namespace"
                - name: uid
                  value: "object.metadata.uid"

    - name: infrastructure-project-control-planes-created-timestamp
      resource:
        group: infrastructure.miloapis.com
        version: v1alpha1
        resource: projectcontrolplanes
      families:
        - name: milo_project_control_planes_created_timestamp
          help: "Creation timestamp of infrastructure project control planes"
          type: gauge
          metrics:
            - value: "double(timestamp(object.metadata.creationTimestamp).getSeconds())"
              labels:
                - name: name
                  value: "object.metadata.name"
                - name: namespace
                  value: "object.metadata.namespace"

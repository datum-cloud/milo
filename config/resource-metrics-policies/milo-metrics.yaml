apiVersion: resourcemetrics.miloapis.com/v1alpha1
kind: ResourceMetricsPolicy
metadata:
  name: milo-metrics
spec:
  generators:
    # iam.miloapis.com: Group
    - name: iam-groups-info
      resource:
        group: iam.miloapis.com
        version: v1alpha1
        resource: groups
      families:
        - name: milo_groups_info
          help: "Information about IAM groups"
          type: gauge
          metrics:
            - labels:
                - name: name
                  value: "object.metadata.name"
                - name: namespace
                  value: "object.metadata.namespace"
                - name: uid
                  value: "object.metadata.uid"

    - name: iam-groups-created-timestamp
      resource:
        group: iam.miloapis.com
        version: v1alpha1
        resource: groups
      families:
        - name: milo_groups_created_timestamp
          help: "Creation timestamp of IAM groups"
          type: gauge
          metrics:
            - value: "double(timestamp(object.metadata.creationTimestamp).getSeconds())"
              labels:
                - name: name
                  value: "object.metadata.name"
                - name: namespace
                  value: "object.metadata.namespace"

    # iam.miloapis.com: GroupMembership

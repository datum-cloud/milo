      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GrantCreationPolicy is the Schema for the grantcreationpolicies
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GrantCreationPolicySpec defines the desired state of GrantCreationPolicy.
            properties:
              enabled:
                default: true
                description: |-
                  Enabled determines if this policy is active.
                  If false, no ResourceGrants will be created for matching resources.
                type: boolean
              target:
                description: Target defines where and how grants should be created.
                properties:
                  parentContext:
                    description: |-
                      ParentContext defines cross-control-plane targeting.
                      If specified, grants will be created in the target parent context
                      instead of the current control plane.
                    properties:
                      apiGroup:
                        description: APIGroup of the parent context resource.
                        maxLength: 253
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                        type: string
                      kind:
                        description: Kind of the parent context resource.
                        maxLength: 63
                        minLength: 1
                        pattern: ^[A-Z][a-zA-Z0-9]*$
                        type: string
                      nameExpression:
                        description: |-
                          NameExpression is a CEL expression to resolve the parent context name.
                          The expression must return a string value.
                          Available variables:
                          - object: The trigger resource being evaluated (same as .trigger in Go templates)
                        maxLength: 512
                        minLength: 1
                        type: string
                    required:
                    - apiGroup
                    - kind
                    - nameExpression
                    type: object
                  resourceGrantTemplate:
                    description: ResourceGrantTemplate defines how to create ResourceGrants.
                    properties:
                      metadata:
                        description: Metadata template for the created ResourceGrant.
                        properties:
                          annotations:
                            additionalProperties:
                              type: string
                            description: |-
                              Annotations to add to created grants.
                              Supports Go template syntax in values.
                              Available variables: .ResourceName, .ResourceKind, .Namespace, .PolicyName, .trigger
                            maxProperties: 64
                            type: object
                          labels:
                            additionalProperties:
                              type: string
                            description: |-
                              Labels to add to created grants.
                              Template variables are not supported in label values.
                            maxProperties: 64
                            type: object
                          name:
                            description: |-
                              Name for grant names using Go template syntax.
                              Available variables: .ResourceName, .ResourceKind, .Namespace, .PolicyName, .trigger
                            maxLength: 253
                            minLength: 1
                            type: string
                          namespace:
                            description: |-
                              Namespace where grants are created.
                              Supports Go template syntax.
                              Available variables: .ResourceName, .ResourceKind, .Namespace, .PolicyName, .trigger
                              If not specified, defaults to "milo-system".
                            maxLength: 253
                            type: string
                        required:
                        - name
                        type: object
                      spec:
                        description: Spec template for the created ResourceGrant.
                        properties:
                          allowances:
                            description: |-
                              Allowances defines static resource allowances.
                              Dynamic allowance calculation is not supported.
                            items:
                              description: AllowanceTemplate defines static allowance
                                configuration.
                              properties:
                                buckets:
                                  description: Buckets define quota buckets with static
                                    amounts.
                                  items:
                                    description: BucketTemplate defines a static quota
                                      bucket.
                                    properties:
                                      amount:
                                        description: Amount of quota to grant (static
                                          value only).
                                        format: int64
                                        maximum: 1000000000
                                        minimum: 0
                                        type: integer
                                      dimensionSelector:
                                        description: |-
                                          DimensionSelector for this bucket using Kubernetes LabelSelector.
                                          If not specified, the bucket applies to all dimensions.
                                        properties:
                                          matchExpressions:
                                            description: matchExpressions is a list
                                              of label selector requirements. The
                                              requirements are ANDed.
                                            items:
                                              description: |-
                                                A label selector requirement is a selector that contains values, a key, and an operator that
                                                relates the key and values.
                                              properties:
                                                key:
                                                  description: key is the label key
                                                    that the selector applies to.
                                                  type: string
                                                operator:
                                                  description: |-
                                                    operator represents a key's relationship to a set of values.
                                                    Valid operators are In, NotIn, Exists and DoesNotExist.
                                                  type: string
                                                values:
                                                  description: |-
                                                    values is an array of string values. If the operator is In or NotIn,
                                                    the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                                    the values array must be empty. This array is replaced during a strategic
                                                    merge patch.
                                                  items:
                                                    type: string
                                                  type: array
                                                  x-kubernetes-list-type: atomic
                                              required:
                                              - key
                                              - operator
                                              type: object
                                            type: array
                                            x-kubernetes-list-type: atomic
                                          matchLabels:
                                            additionalProperties:
                                              type: string
                                            description: |-
                                              matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                              map is equivalent to an element of matchExpressions, whose key field is "key", the
                                              operator is "In", and the values array contains only "value". The requirements are ANDed.
                                            type: object
                                        type: object
                                        x-kubernetes-map-type: atomic
                                    required:
                                    - amount
                                    type: object
                                  maxItems: 10
                                  minItems: 1
                                  type: array
                                resourceType:
                                  description: |-
                                    ResourceType being granted.
                                    Must correspond to an active ResourceRegistration.
                                  maxLength: 253
                                  minLength: 1
                                  pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*\/[A-Z][a-zA-Z0-9]*$
                                  type: string
                              required:
                              - buckets
                              - resourceType
                              type: object
                            maxItems: 20
                            minItems: 1
                            type: array
                          consumerRef:

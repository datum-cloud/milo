                                maxLength: 253
                                type: string
                              kind:
                                description: |-
                                  Kind template for the consumer.
                                  Supports Go template syntax.
                                  Available variables: .ResourceName, .ResourceKind, .Namespace, .PolicyName, .trigger
                                maxLength: 63
                                minLength: 1
                                type: string
                              name:
                                description: |-
                                  Name for the consumer name using Go template syntax.
                                  Available variables: .ResourceName, .ResourceKind, .Namespace, .PolicyName, .trigger
                                maxLength: 253
                                minLength: 1
                                type: string
                            required:
                            - kind
                            - name
                            type: object
                        required:
                        - allowances
                        - consumerRef
                        type: object
                    required:
                    - metadata
                    - spec
                    type: object
                required:
                - resourceGrantTemplate
                type: object
              trigger:
                description: Trigger defines what resource changes should trigger
                  grant creation.
                properties:
                  conditions:
                    description: |-
                      Conditions are CEL expressions that must evaluate to true for grant creation.
                      All conditions must pass for the policy to trigger.
                      The 'object' variable contains the trigger resource being evaluated.
                    items:
                      description: ConditionExpression defines a CEL expression for
                        condition evaluation.
                      properties:
                        expression:
                          description: |-
                            Expression is the CEL expression to evaluate against the trigger resource.
                            The expression must return a boolean value.
                            Available variables:
                            - object: The trigger resource being evaluated (same as .trigger in Go templates)
                          maxLength: 1024
                          minLength: 1
                          type: string
                        message:
                          description: Message provides a human-readable description
                            of the condition requirement.
                          maxLength: 256
                          type: string
                      required:
                      - expression
                      type: object
                    maxItems: 10
                    type: array
                  resource:
                    description: Resource specifies which resource type triggers this
                      policy.
                    properties:
                      apiVersion:
                        description: |-
                          APIVersion of the trigger resource in the format "group/version".
                          For core resources, use "v1".
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*\/)?v[0-9]+((alpha|beta)[0-9]*)?$
                        type: string
                      kind:
                        description: Kind is the kind of the trigger resource.
                        maxLength: 63
                        minLength: 1
                        pattern: ^[A-Z][a-zA-Z0-9]*$
                        type: string
                    required:
                    - apiVersion
                    - kind
                    type: object
                required:
                - resource
                type: object
            required:
            - target
            - trigger
            type: object
          status:

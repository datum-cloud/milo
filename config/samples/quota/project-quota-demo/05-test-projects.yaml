# Test Projects - These demonstrate quota enforcement
# Apply these one by one to see quota limits in action

---
# Project 1: Development tier, us-east-1 (should succeed - within quota)
apiVersion: resourcemanager.miloapis.com/v1alpha1
kind: Project
metadata:
  name: acme-dev-api
  labels:
    quota.miloapis.com/tier: "development"
    quota.miloapis.com/region: "us-east-1"
    quota.miloapis.com/demo: "project-quota"
spec:
  ownerRef:
    kind: Organization
    name: "datum"

---

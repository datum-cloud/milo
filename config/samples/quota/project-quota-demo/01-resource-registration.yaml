apiVersion: quota.miloapis.com/v1alpha1
kind: ResourceRegistration
metadata:
  name: projects-per-organization-registration
  labels:
    quota.miloapis.com/resource-category: "core"
    quota.miloapis.com/demo: "project-quota"
spec:
  # Owner type that this quota applies to (Organization)
  consumerTypeRef:
    apiGroup: resourcemanager.miloapis.com
    kind: Organization

  # Entity type for countable resources like projects
  type: "Entity"

  # Fully qualified name of the resource type being registered
  resourceType: "resourcemanager.miloapis.com/Project"

  # Human-readable description
  description: "Maximum number of projects that can be created within an organization, categorized by service tier and deployment region."

  # The singular form of the base unit of measurement
  baseUnit: "Project"

  # The pluralized form of the unit for display
  displayUnit: "Projects"

  # Conversion factor (1:1 for simple entity counting)
  unitConversionFactor: 1

apiVersion: quota.miloapis.com/v1alpha1
kind: GrantCreationPolicy
metadata:
  name: invalid-test-policy
spec:
  enabled: true
  trigger:
    resource:
      apiVersion: "resourcemanager.miloapis.com/v1alpha1"
      kind: "Organization"
    conditions:
      # Invalid CEL expression - should cause validation failure
      - expression: 'object.spec.invalid_field == "test" && invalid_function()'
  target:
    resourceGrantTemplate:
      metadata:
        # Missing required name field to cause validation failure
        namespace: "milo-system"
      spec:
        consumerRef:
          apiGroup: "resourcemanager.miloapis.com"
          kind: "Organization"
          name: "{{.trigger.metadata.name}}"
        allowances:
          - resourceType: "nonexistent.resource.type"
            buckets:
              - amount: -1  # Invalid negative amount
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: basic-quota-enforcement
spec:
  # Define clusters for organizational context testing
  clusters:
    main:
      kubeconfig: kubeconfig-main
    org:
      kubeconfig: kubeconfig-org-template

  steps:
    # Clean up any leftover ResourceClaims and Projects from previous test runs
    - name: cleanup-old-resources
      try:
        - script:
            content: |
              # Clean up ResourceClaims using the correct kubeconfig
              kubectl --kubeconfig=kubeconfig-main delete resourceclaims -n milo-system --all --ignore-not-found=true
              # Clean up test projects
              kubectl --kubeconfig=kubeconfig-org-template delete projects test-project-1 test-project-2 test-project-3 test-project-4 --ignore-not-found=true
              # Clean up AllowanceBuckets
              kubectl --kubeconfig=kubeconfig-main delete allowancebuckets -n milo-system --all --ignore-not-found=true
              # Clean up ClaimCreationPolicies
              kubectl --kubeconfig=kubeconfig-main delete claimcreationpolicies test-project-quota-policy --ignore-not-found=true

    # Setup base quota infrastructure
    - name: setup-base-infrastructure
      try:
        - apply:
            file: 01-resource-registration.yaml
        - wait:
            apiVersion: quota.miloapis.com/v1alpha1
            kind: ResourceRegistration
            name: test-projects-per-org
            timeout: 30s
            for:
              condition:
                name: Active
                value: 'True'
        - assert:
            file: assertions/assert-resource-registration.yaml

    # Create organization and dependencies
    - name: setup-organization
      try:
        - apply:
            file: 02-test-organization.yaml
        - wait:
            apiVersion: v1
            kind: Namespace
            name: organization-test-quota-org
            timeout: 30s
            for:
              jsonPath:
                path: '{.status.phase}'
                value: Active
        - apply:
            file: 03-test-user.yaml
        - apply:
            file: 04-organization-membership.yaml
        - assert:
            file: assertions/assert-organization.yaml

    # Create resource grant
    - name: create-resource-grant
      try:
        - apply:
            file: standard-org-grant-template.yaml
        - wait:
            apiVersion: quota.miloapis.com/v1alpha1
            kind: ResourceGrant
            name: test-quota-org-grant
            namespace: milo-system
            timeout: 30s
            for:
              condition:
                name: Active
                value: 'True'

    # Setup claim creation policy
    - name: setup-claim-creation-policy
      try:
        - apply:
            file: project-creation-policy.yaml
        - wait:
            apiVersion: quota.miloapis.com/v1alpha1
            kind: ClaimCreationPolicy
            name: test-project-quota-policy
            timeout: 30s
            for:
              condition:
                name: Ready
                value: 'true'

    # Test project creation within quota limits (using organizational context)
    - name: test-projects-within-quota
      cluster: org
      try:
        # Create all projects concurrently to mimic real-world scenarios
        - apply:
            file: test-data/projects-within-quota.yaml
        - apply:
            file: test-data/projects-additional.yaml
        - wait:
            apiVersion: resourcemanager.miloapis.com/v1alpha1
            kind: Project
            name: test-project-1
            timeout: 30s
            for:
              condition:
                name: Ready
                value: 'true'
        - wait:
            apiVersion: resourcemanager.miloapis.com/v1alpha1
            kind: Project
            name: test-project-2
            timeout: 30s
            for:
              condition:
                name: Ready
                value: 'true'
        - wait:
            apiVersion: resourcemanager.miloapis.com/v1alpha1
            kind: Project
            name: test-project-3
            timeout: 30s
            for:
              condition:
                name: Ready
                value: 'true'
        - assert:
            file: assertions/assert-projects-created.yaml

    # Verify resource claims were created and allocated
    - name: verify-resource-claims
      try:
        - wait:
            apiVersion: quota.miloapis.com/v1alpha1
            kind: ResourceClaim
            namespace: milo-system
            timeout: 30s
            for:
              condition:
                name: Granted
                value: 'True'
        - assert:
            file: assertions/assert-resource-claims.yaml

    # Test quota enforcement - attempt to exceed quota
    - name: test-quota-enforcement
      cluster: org
      try:
        - script:
            content: |
              # Try to create a project that should exceed quota
              if kubectl apply -f test-data/project-exceeds-quota.yaml 2>&1 | grep -q "Resource quota exceeded"; then
                echo "✅ Quota enforcement working correctly - project creation was rejected"
                exit 0
              else
                echo "❌ Quota enforcement failed - project creation should have been rejected"
                exit 1
              fi

    # Cleanup test resources (projects will be deleted by Chainsaw automatically)
    - name: cleanup-projects
      cluster: org
      try:
        - delete:
            ref:
              apiVersion: resourcemanager.miloapis.com/v1alpha1
              kind: Project
              name: test-project-1
        - wait:
            apiVersion: resourcemanager.miloapis.com/v1alpha1
            kind: Project
            name: test-project-1
            timeout: 30s
            for:
              deletion: {}
